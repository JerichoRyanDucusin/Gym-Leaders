<div class="card">
    <div class="icon">{{ emoji() }}</div>
    <h3>{{ name() }}</h3>
    <p>Location: {{ location() }}</p>
    <p>Age: {{ age() }}</p>
    <p>Badge: {{ badge() }}</p>
    
    <strong>Team:</strong>
    <ul>
      @for (pokemon of pokemonTeam(); track $index) {
        <li>{{ pokemon }}</li>
      }
    </ul>
  
    <!-- Button triggers the Output function event -->
    <button (click)="speakMonologue()">
      Motto / Monologue
    </button>
  </div>
